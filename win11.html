<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Windows 11 iPad Edition</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }
        .desktop {
            width: 100vw;
            height: 100vh;
            background: url('https://images.unsplash.com/photo-1620121692029-d088224efc74?auto=format&fit=crop&w=1920&q=80') no-repeat center center fixed;
            background-size: cover;
            position: relative;
        }
        .taskbar {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 48px;
            background: rgba(243, 243, 243, 0.85);
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .tb-icons {
            display: flex;
            gap: 8px;
        }
        .tb-icon {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            transition: background 0.2s;
            cursor: pointer;
        }
        .tb-icon:active {
            background: rgba(255, 255, 255, 0.5);
            transform: scale(0.9);
        }
        .tb-icon img {
            width: 26px;
            height: 26px;
        }
        .tray {
            position: absolute;
            right: 12px;
            color: #333;
            font-size: 11px;
            text-align: right;
        }
        .start-menu {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 500px;
            height: 500px;
            background: rgba(243, 243, 243, 0.9);
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: none;
            z-index: 999;
            padding: 20px;
        }
        .window {
            position: absolute;
            top: 10%;
            left: 10%;
            width: 80%;
            height: 70%;
            background: white;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            display: none;
            flex-direction: column;
            overflow: hidden;
            z-index: 100;
            touch-action: none;
        }
        .window-header {
            height: 45px;
            background: #f3f3f3;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            cursor: move;
        }
        .win-btn {
            width: 45px;
            height: 40px;
            border: none;
            background: transparent;
            font-size: 16px;
        }
        .window-content {
            flex-grow: 1;
            -webkit-overflow-scrolling: touch;
            overflow: auto;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

<div class="desktop" onclick="closeStart()">
    <div id="startMenu" class="start-menu" onclick="event.stopPropagation()">
        <input type="text" style="width:90%; padding:10px; border-radius:20px; border:1px solid #ccc;" placeholder="搜尋...">
    </div>

    <div id="window-edge" class="window">
        <div class="window-header" id="window-edgeHeader">
            <span>Microsoft Edge</span>
            <button class="win-btn" onclick="closeWindow('window-edge')">✕</button>
        </div>
        <div class="window-content">
            <iframe src="https://www.bing.com"></iframe>
        </div>
    </div>
</div>

<div class="taskbar">
    <div class="tb-icons">
        <div class="tb-icon" onclick="toggleStart(event)">
            <img src="https://img.icons8.com/color/48/windows-11.png">
        </div>
        <div class="tb-icon" onclick="openWindow('window-edge')">
            <img src="https://img.icons8.com/color/48/microsoft-edge.png">
        </div>
        <div class="tb-icon">
            <img src="https://img.icons8.com/color/48/folder-invoices--v1.png">
        </div>
    </div>
    <div class="tray">
        <div id="time" style="font-weight: 600;"></div>
        <div id="date"></div>
    </div>
</div>

<script>
    function updateClock() {
        const now = new Date();
        document.getElementById('time').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        document.getElementById('date').innerText = now.toLocaleDateString();
    }
    setInterval(updateClock, 1000);
    updateClock();

    function toggleStart(e) {
        e.stopPropagation();
        const menu = document.getElementById('startMenu');
        menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
    }

    function closeStart() {
        document.getElementById('startMenu').style.display = 'none';
    }

    function openWindow(id) {
        document.getElementById(id).style.display = 'flex';
    }

    function closeWindow(id) {
        document.getElementById(id).style.display = 'none';
    }

    dragElement(document.getElementById("window-edge"));

    function dragElement(elmnt) {
        var pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
        const header = document.getElementById(elmnt.id + "Header");
        
        header.onmousedown = dragStart;
        header.ontouchstart = dragStart;

        function dragStart(e) {
            const event = e.type === 'touchstart' ? e.touches[0] : e;
            pos3 = event.clientX;
            pos4 = event.clientY;
            document.onmouseup = dragEnd;
            document.ontouchend = dragEnd;
            document.onmousemove = dragMove;
            document.ontouchmove = dragMove;
        }

        function dragMove(e) {
            const event = e.type === 'touchmove' ? e.touches[0] : e;
            pos1 = pos3 - event.clientX;
            pos2 = pos4 - event.clientY;
            pos3 = event.clientX;
            pos4 = event.clientY;
            elmnt.style.top = (elmnt.offsetTop - pos2) + "px";
            elmnt.style.left = (elmnt.offsetLeft - pos1) + "px";
        }

        function dragEnd() {
            document.onmouseup = null;
            document.ontouchend = null;
            document.onmousemove = null;
            document.ontouchmove = null;
        }
    }
</script>

</body>
</html>
